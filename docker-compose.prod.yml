# ==========================================
# Docker Compose — Production
# ==========================================
# Usage: docker compose -f docker-compose.prod.yml up -d --build
# ==========================================

services:
  db:
    image: postgres:16-alpine
    container_name: hajj_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hajj_pilgrims}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hajj_pilgrims}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - hajj_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hajj_api_prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hajj_pilgrims}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:5173"]'}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}
      HOST: "0.0.0.0"
      PORT: "8000"
      WORKERS: ${WORKERS:-2}
    volumes:
      - audio_cache_prod:/app/audio_cache
    networks:
      - hajj_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  pgdata_prod:
    driver: local
  audio_cache_prod:
    driver: local

networks:
  hajj_network:
    driver: bridge

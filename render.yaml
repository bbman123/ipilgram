# ==========================================
# Render Deployment Configuration
# ==========================================
# https://render.com/docs/infra-as-yaml

services:
  - type: web
    name: hajj-pilgrims-api
    runtime: python
    plan: starter
    buildCommand: |
      cd backend
      pip install -r requirements.txt
      alembic upgrade head
    startCommand: |
      cd backend
      gunicorn app.main:app \
        --workers 2 \
        --worker-class uvicorn.workers.UvicornWorker \
        --bind 0.0.0.0:$PORT \
        --timeout 120 \
        --graceful-timeout 30 \
        --access-logfile - \
        --error-logfile -
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ORIGINS
        value: '["https://your-admin-domain.onrender.com"]'
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        sync: false
      - key: HOST
        value: "0.0.0.0"
      - key: WORKERS
        value: "2"
      - key: LOG_LEVEL
        value: "info"
      - key: APP_VERSION
        value: "1.0.0"
    healthCheckPath: /api/v1/health
    autoDeploy: true
    disk:
      name: audio-cache
      mountPath: /app/audio_cache
      sizeGB: 1

  - type: postgres
    name: hajj-pilgrims-db
    database: hajj_pilgrims
    plan: starter
    ipAllowList: []
